# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
kotlin.code.style=official

# Suppress the error regarding kotlin.sourceSets with built-in Kotlin
android.disallowKotlinSourceSets=false

# If you encounter issues with Dagger Hilt or other plugins that depend on legacy APIs
android.newDsl=false
android.builtInKotlin=false

# Disable KSP2 to avoid "unexpected jvm signature V" errors with Room/Kotlin 2.2.10
ksp.useKSP2=false
